<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout · TestCommerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_v }}">
</head>
<body>
    {% include '_preloader.html' %}

    <nav class="navbar">
        <a href="/" class="logo">Test<span>Commerce</span></a>
        <div class="nav-links">
            <a href="/">Inicio</a>
            <a href="/productos">Productos</a>
            <a href="/carrito" class="nav-cart">Carrito<span class="cart-count" data-cart-count hidden>0</span></a>
            {% if current_rol == 'admin' %}<a href="/admin">Admin</a>{% endif %}
        </div>
    </nav>

    <div class="form-box">
        <h1>Finalizar compra</h1>
        <p class="subtitulo">Completá tus datos para confirmar el pedido.</p>

        <form method="POST">
            <label>Nombre completo</label>
            <input type="text" name="nombre" placeholder="Ej: Enrique Bustamante">

            <label>Dirección</label>
            <input type="text" name="direccion" placeholder="Ej: Av. Corrientes 1234">

            <label>Teléfono</label>
            <input type="text" name="telefono" placeholder="Ej: 1123456789">

            <label>Método de pago</label>
            <select name="pago">
                <option value="">Seleccionar</option>
                <option value="tarjeta">Tarjeta</option>
                <option value="mercadopago">MercadoPago</option>
                <option value="transferencia">Transferencia</option>
            </select>

            <button class="btn btn-block" type="submit">Confirmar pedido</button>
        </form>

        {% if mensaje %}<p class="mensaje">{{ mensaje }}</p>{% endif %}
    </div>

    <footer class="footer">
        TestCommerce · Checkout
    </footer>

    <script type="module" src="{{ url_for('static', filename='animations.js') }}?v={{ asset_v }}"></script>
    <script type="module" src="{{ url_for('static', filename='cart.js') }}?v={{ asset_v }}"></script>
    {% if is_debug %}<script src="{{ url_for('static', filename='dev-reload.js') }}"></script>{% endif %}
    <script>
        document.body.classList.add('is-loading');
        window.addEventListener('load', () => {
            const p = document.getElementById('preloader');
            if (!p) return;
            setTimeout(() => {
                p.classList.add('hidden');
                document.body.classList.remove('is-loading');
                setTimeout(() => p.remove(), 600);
            }, 400);
        });
    </script>
</body>
</html>
